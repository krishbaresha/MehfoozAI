services:
  - type: web
    name: mehfooz-backend
    env: python
    rootDirectory: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_PHONE_NUMBER_ID
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false

  - type: static
    name: mehfooz-frontend
    env: node
    rootDirectory: frontend
    buildCommand: npm install && STATIC_EXPORT=true npm run build
    publishPath: out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://mehfooz-backend.onrender.com # Change this to your actual backend URL after first deploy
